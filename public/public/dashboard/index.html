<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Birthday Reminder</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <nav class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between">
      <h1 class="text-2xl font-bold text-blue-600">🎂 Birthday Reminder</h1>
      <button onclick="logout()" class="text-gray-600 hover:text-gray-900">Logout</button>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <div class="grid md:grid-cols-2 gap-8">
      <div class="bg-white p-6 rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-4">Upcoming Birthdays</h2>
        <div id="birthdays" class="space-y-4"></div>
      </div>

      <div class="bg-white p-6 rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-4">Quote Wall</h2>
        <form id="quoteForm" class="mb-4 space-y-2">
          <input type="text" id="content" placeholder="Quote" class="w-full px-3 py-2 border rounded" required>
          <input type="text" id="author" placeholder="Author" class="w-full px-3 py-2 border rounded" required>
          <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Add Quote</button>
        </form>
        <div id="quotes" class="space-y-4"></div>
      </div>
    </div>
  </main>

  <script>
    const userId = localStorage.getItem('userId');
    if (!userId) window.location.href = '/login.html';

    async function loadBirthdays() {
      const res = await fetch(`/api/birthdays?userId=${userId}`);
      const data = await res.json();
      document.getElementById('birthdays').innerHTML = data.length ? 
        data.map(b => `<div class="p-4 border rounded"><p class="font-semibold">${b.name}</p><p class="text-gray-600">${b.date} - ${b.relationship}</p></div>`).join('') :
        '<p class="text-gray-500">No birthdays yet</p>';
    }

    async function loadQuotes() {
      const res = await fetch('/api/quotes');
      const data = await res.json();
      document.getElementById('quotes').innerHTML = data.map(q => 
        `<div class="p-4 border rounded"><p class="italic">"${q.content}"</p><div class="flex justify-between mt-2"><p class="text-sm text-gray-600">- ${q.author}</p><button onclick="like('${q.id}')" class="text-blue-600">❤️ ${q.likes}</button></div></div>`
      ).join('');
    }

    document.getElementById('quoteForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      await fetch('/api/quotes', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          userId,
          content: document.getElementById('content').value,
          author: document.getElementById('author').value
        })
      });
      document.getElementById('quoteForm').reset();
      loadQuotes();
    });

    async function like(id) {
      await fetch(`/api/quotes/${id}/like`, {method: 'POST'});
      loadQuotes();
    }

    function logout() {
      localStorage.removeItem('userId');
      window.location.href = '/';
    }

    loadBirthdays();
    loadQuotes();
  </script>
</body>
</html>
