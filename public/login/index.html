<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Birthday Reminder</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-3xl font-bold text-center mb-6">🎂 Birthday Reminder</h2>
    <a href="/api/auth/google" class="flex items-center justify-center gap-3 w-full border border-gray-300 py-2.5 rounded-lg hover:bg-gray-50 transition mb-6 shadow-sm">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      <span class="text-gray-700 font-medium">Continue with Google</span>
    </a>
    <div class="flex items-center gap-3 mb-6">
      <div class="flex-1 border-t border-gray-200"></div>
      <span class="text-gray-400 text-sm">or login with email</span>
      <div class="flex-1 border-t border-gray-200"></div>
    </div>
    <div id="error" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4"></div>
    <div id="urlError" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4"></div>
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-2">Email</label>
        <input type="email" id="email" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Password</label>
        <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium">Login</button>
    </form>
    <p class="text-center mt-4 text-sm text-gray-600">
      Don't have an account? <a href="/signup" class="text-blue-600 hover:underline">Sign up</a>
    </p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const errorParam = params.get('error');
    if (errorParam) {
      const messages = {no_code:'Google login was cancelled.',token_failed:'Failed to get token from Google.',oauth_failed:'Google login failed. Please try again.'};
      const urlError = document.getElementById('urlError');
      urlError.textContent = messages[errorParam] || 'Login failed.';
      urlError.classList.remove('hidden');
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
e.preventDefault();
const res = await fetch('/api/auth/login', {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({email: document.getElementById('email').value, password: document.getElementById('password').value})
});
const data = await res.json();
if (data.success) { localStorage.setItem('userId', data.userId); window.location.href = '/dashboard'; }
else { const e = document.getElementById('error'); e.textContent = data.error; e.classList.remove('hidden'); }
});
</script>
</body>
</html>
