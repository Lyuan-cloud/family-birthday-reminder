<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Birthday Reminder</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-3xl font-bold text-center mb-6">Login</h2>
    <div id="error" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4"></div>
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-2">Email</label>
        <input type="email" id="email" class="w-full px-4 py-2 border rounded-lg" required>
      </div>
      <div>
        <label class="block text-sm font-medium mb-2">Password</label>
        <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg" required>
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Login</button>
    </form>
    <p class="text-center mt-4 text-sm">
      Don't have an account? <a href="/signup.html" class="text-blue-600 hover:underline">Sign up</a>
    </p>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email, password})
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('userId', data.userId);
        window.location.href = '/dashboard.html';
      } else {
        document.getElementById('error').textContent = data.error;
        document.getElementById('error').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
