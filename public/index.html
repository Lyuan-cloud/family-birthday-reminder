<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Birthday Reminder</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-blue-600">🎂 Birthday Reminder</h1>
      <a href="/login.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Login</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-16">
    <div class="text-center mb-16">
      <h2 class="text-5xl font-bold text-gray-900 mb-4">Never Miss a Birthday Again</h2>
      <p class="text-xl text-gray-600 mb-8">Keep track of family birthdays and share heartfelt wishes</p>
      <a href="/signup.html" class="px-8 py-3 bg-blue-600 text-white text-lg rounded-lg hover:bg-blue-700">Get Started Free</a>
    </div>

    <div class="grid md:grid-cols-3 gap-8 mt-16">
      <div class="p-6 bg-white rounded-lg shadow-md">
        <div class="text-4xl mb-4">📅</div>
        <h3 class="text-xl font-bold mb-2">Smart Reminders</h3>
        <p class="text-gray-600">Get notified before birthdays</p>
      </div>
      <div class="p-6 bg-white rounded-lg shadow-md">
        <div class="text-4xl mb-4">💬</div>
        <h3 class="text-xl font-bold mb-2">Quote Wall</h3>
        <p class="text-gray-600">Share birthday wishes</p>
      </div>
      <div class="p-6 bg-white rounded-lg shadow-md">
        <div class="text-4xl mb-4">🎁</div>
        <h3 class="text-xl font-bold mb-2">Easy to Use</h3>
        <p class="text-gray-600">Simple for the whole family</p>
      </div>
    </div>
  </main>
</body>
</html>
